        /* ========== STYLES GÉNÉRAUX ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ========== CONTENEUR DE L'ANIMATION ========== */
        #animation-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none; /* l'animation ne bloque pas les clics */
        }

        .animation-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        /* 1. L'icône de Transfert */
        .transfer-icon {
            width: 60px;
            height: 60px;
            position: relative;
            margin-bottom: 20px;
            opacity: 0;
            animation: fadeIn 0.8s ease forwards 0.5s;
        }

        .arrow-circle {
            width: 100%;
            height: 100%;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            position: absolute;
        }

        .arrows {
            width: 100%;
            height: 100%;
            border: 2px solid transparent;
            border-top: 2px solid #fff;
            border-bottom: 2px solid #fff;
            border-radius: 50%;
            animation: rotateIcon 3s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }

        /* 2. Le Nom OminiPay */
        .brand {
            color: #fff;
            font-size: clamp(35px, 10vw, 65px);
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            opacity: 0;
            transform: scale(0.9);
            animation: zoomIn 0.8s ease forwards 1s;
        }

        .slogan {
            color: rgba(255,255,255,0.6);
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeIn 1s ease forwards 1.5s;
        }

        /* 3. La Ligne Magique */
        .line-to-wallet {
            width: 0;
            height: 2px;
            background-color: #fff;
            position: relative;
            animation: stretchLine 1.5s cubic-bezier(0.7, 0, 0.3, 1) 2s forwards;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wallet-shape {
            width: 50px;
            height: 35px;
            border: 2px solid #fff;
            border-radius: 6px;
            position: absolute;
            opacity: 0;
            transform: translateY(20px);
            animation: slideWallet 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) 3.5s forwards;
        }

        .wallet-shape::after {
            content: '';
            position: absolute;
            right: -2px;
            top: 10px;
            width: 10px;
            height: 15px;
            border: 2px solid #fff;
            border-left: none;
            border-radius: 0 4px 4px 0;
        }

        /* 4. Explosion Finale Blanche */
        .reveal {
            position: fixed;
            width: 0;
            height: 0;
            background-color: #fff;
            border-radius: 50%;
            animation: explode 1s cubic-bezier(0.8, 0, 0.2, 1) 5s forwards;
            z-index: 5;
        }

        /* IMAGE FINALE REMPLAÇANT LE TEXTE */
        .final-logo-img {
            position: fixed;
            width: 250px;
            height: auto;
            opacity: 0;
            z-index: 20;
            animation: fadeInLogo 0.6s ease 5.8s forwards;
        }

        /* Keyframes */
        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes fadeIn { to { opacity: 1; } }

        @keyframes zoomIn {
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes stretchLine {
            0% { width: 0; }
            50% { width: 90%; }
            100% { width: 60px; height: 2px; }
        }

        @keyframes slideWallet {
            to {
                opacity: 1;
                transform: translateY(-18px);
            }
        }

        @keyframes explode {
            to { width: 400vw; height: 400vw; }
        }

        @keyframes fadeInLogo {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* ========== FORMULAIRE D'INSCRIPTION (caché par défaut) ========== */
        #form-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85); /* transparence noire */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none; /* caché initialement */
            justify-content: center;
            align-items: center;
            z-index: 100;
            overflow-y: auto;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 35px;
            padding: 30px 25px 40px 25px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            color: #fff;
        }

        .brand-logo {
            width: 180px;
            height: auto;
            margin-bottom: 25px;
        }

        .lang-selector {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .lang-trigger {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group { width: 100%; margin-bottom: 22px; text-align: left; }
        label { font-size: 13px; color: rgba(255,255,255,0.6); margin-bottom: 10px; display: block; padding-left: 5px; }

        .custom-input {
            width: 100%;
            padding: 16px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            color: #fff; font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .custom-input:active { transform: scale(0.97); }

        /* MENU PAYS PLEIN ÉCRAN */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none; flex-direction: column;
            z-index: 2000;
            animation: slideUp 0.4s cubic-bezier(0, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            padding: 25px; border-bottom: 1px solid #222;
            display: flex; align-items: center; justify-content: space-between;
        }

        .close-btn { font-size: 28px; cursor: pointer; color: #fff; }

        .modal-content {
            flex: 1; overflow-y: auto; padding: 10px;
        }

        .country-item, .lang-item {
            padding: 20px; border-bottom: 1px solid #111;
            display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; font-size: 18px; color: #fff;
        }

        .country-item:active, .lang-item:active { background: #222; }
        .currency { color: #888; font-weight: 700; font-size: 14px; }
        .flag { margin-right: 15px; font-size: 22px; }

        .checkbox-group { 
            display: flex; align-items: center; gap: 15px; 
            font-size: 12px; color: rgba(255,255,255,0.7); margin: 25px 0; cursor: pointer;
            text-align: left;
        }
        
        input[type="checkbox"] { 
            width: 22px; height: 22px;

            accent-color: #007AFF;
        }

        .btn-google {
            width: 100%; padding: 18px;
            background: #fff; color: #000;
            border: none; border-radius: 18px;
            font-weight: 700; font-size: 16px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            transition: transform 0.2s ease;
        }

        .btn-google:active { transform: scale(0.95); }
        .btn-google:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-popup {
            position: fixed; top: 30px;
            background: #ff3b30;
            padding: 15px 30px; border-radius: 15px;
            color: #fff; font-weight: 700;
            opacity: 0; transform: translateY(-20px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 3000;
        }

        .error-popup.show { opacity: 1; transform: translateY(0); }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #333;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

            while (!unique) {
                id = prefix;
                for (let i = 0; i < longueur; i++) {
                    id += caracteres.charAt(Math.floor(Math.random() * caracteres.length));
                }
                const snapshot = await db.collection('utilisateurs').where('idPublic', '==', id).get();
                if (snapshot.empty) unique = true;
            }
            return id;
        }

        // Vérification du code de parrainage (optionnel)
        async function verifierCodeParrainage(code) {
            if (!code) return null;
            const snapshot = await db.collection('utilisateurs').where('idPublic', '==', code).get();
            if (!snapshot.empty) {
                return snapshot.docs[0].id; // retourne l'UID du parrain
            }
            return null;
        }

        // ========== CHARGEMENT DES PAYS ==========
        countries.sort((a,b) => a.n.localeCompare(b.n)).forEach(c => {
            const div = document.createElement('div');
            div.className = 'country-item';
            div.innerHTML = `<div><span class="flag">${c.f}</span>${c.n}</div><span class="currency">${c.d}</span>`;
            div.onclick = () => {
                selectedCountry = c;
                trigger.innerText = `${c.f} ${c.n} (${c.d})`;
                closeModal();
            };
            list.appendChild(div);
        });

        // ========== CHARGEMENT DES LANGUES ==========
        languages.forEach(lang => {
            const div = document.createElement('div');
            div.className = 'lang-item';
            div.innerHTML = `<div><span class="flag">${lang.drapeau}</span>${lang.nom}</div>`;
            div.onclick = () => {
                currentLang = lang.code;
                selectedLangSpan.innerText = lang.nom;
                updateUILanguage();
                closeLangModal();
            };
            langList.appendChild(div);
        });

        // ========== OUVERTURE/FERMETURE DES MODALES ==========
        trigger.onclick = () => modal.style.display = 'flex';
        langTrigger.onclick = () => langModal.style.display = 'flex';

        window.closeModal = function() { modal.style.display = 'none'; };
        window.closeLangModal = function() { langModal.style.display = 'none'; };

        window.onclick = (e) => { 
            if (e.target == modal) modal.style.display = 'none';
            if (e.target == langModal) langModal.style.display = 'none';
        };

        // ========== VALIDATION & AUTHENTIFICATION ==========
        googleBtn.addEventListener('click', async () => {
            const t = translations[currentLang];
            if (!selectedCountry) {
                showError(t.alertSelectCountry);
                return;
            }
            if (!termsCheck.checked) {
                showError(t.alertAcceptTerms);
                return;
            }

            googleBtn.disabled = true;
            const originalContent = googleBtn.innerHTML;
            googleBtn.innerHTML = '<span class="loader"></span>';

            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                const userRef = db.collection('utilisateurs').doc(user.uid);
                const doc = await userRef.get();

                if (doc.exists) {
                    showError(t.alertAccountExists);
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                } else {
                    // Génération ID unique
                    const idPublic = await genererIdPublicUnique();

                    // Vérification code parrainage
                    let parrainUid = null;
                    const codeSaisi = refCode.value.trim();
                    if (codeSaisi) {
                        parrainUid = await verifierCodeParrainage(codeSaisi);
                        if (!parrainUid) {
                            showError(t.alertInvalidReferral);
                            // On continue sans parrain, pas de stockage
                        }
                    }

                    await userRef.set({
                        solde: "0",
                        idPublic: idPublic,
                        pays: selectedCountry.n,
                        devise: selectedCountry.d,
                        email: user.email,
                        nom: user.displayName || "",
                        parrain: parrainUid || null,
                        dateCreation: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    showError(t.alertSuccess);
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 2000);
                }
            } catch (error) {
                console.error(error);
                showError('Erreur: ' + error.message);
                googleBtn.disabled = false;
                googleBtn.innerHTML = originalContent;
            }
        });

        // ========== GESTION DE L'ANIMATION ET DE L'AFFICHAGE ==========
        // On vérifie l'utilisateur dès le chargement
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const doc = await db.collection('utilisateurs').doc(user.uid).get();
                if (doc.exists) {
                    // Déjà inscrit → redirection immédiate après animation ou tout de suite
                    // On attend juste la fin de l'animation pour rediriger
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 6000);
                    userCheckDone = true;
                    return;
                }
            }
            userCheckDone = true;
            // Si l'animation est déjà terminée, on affiche le formulaire
            if (animationFinished) {
                formContainer.style.display = 'flex';
            }
        });

        // L'animation dure 6 secondes (5.8s + marge)
        setTimeout(() => {
            animationFinished = true;
            if (userCheckDone) {
                formContainer.style.display = 'flex';
            }
        }, 6000);

        // ========== INITIALISATION ==========
        updateUILanguage();
    </script>
</body>
