<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OminiPay - Catalogue</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { 
            background: white; 
            border-radius: 25px; 
            padding: 15px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }
        .card img { width: 60px; height: 60px; object-fit: contain; margin-bottom: 10px; border-radius: 12px; }
        .nom { font-weight: 600; font-size: 14px; color: #333; }
        .prix { color: #007AFF; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

    <h2 style="font-weight: 300; text-align: center;">Catalogue OminiPay</h2>
    <div class="grid" id="liste-cartes">Chargement des cartes...</div>

    <script>
        // 1. CONFIGURATION (Remplace par TES infos de la console Firebase)
        const firebaseConfig = {
            apiKey: "TON_API_KEY",
            authDomain: "ominipay.firebaseapp.com",
            projectId: "ominipay",
            appId: "TON_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. LE SCRIPT DE RÉCUPÉRATION
        function chargerCatalogue() {
            const container = document.getElementById('liste-cartes');
            
            // On va lire la collection "cartes"
            db.collection("cartes").get().then((querySnapshot) => {
                container.innerHTML = ""; // On efface le message "Chargement..."

                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    
                    // Sécurité : on accepte 'nom' ou 'Nom', 'prix' ou 'Prix', etc.
                    const cardNom = data.nom || data.Nom || "Sans titre";
                    const cardPrix = data.prix || data.Prix || "0";
                    const cardImg = data.image || data.Image || data.logo || "https://via.placeholder.com/60";

                    container.innerHTML += `
                        <div class="card">
                            <img src="${cardImg}" alt="${cardNom}">
                            <div class="nom">${cardNom}</div>
                            <div class="prix">${cardPrix} XOF</div>
                        </div>
                    `;
                });
            }).catch((error) => {
                container.innerHTML = "Erreur Firestore : " + error.message;
            });
        }

        // Lancement automatique
        chargerCatalogue();
    </script>
</body>
</html>
