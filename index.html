<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OminiPay - Catalogue Test</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: white; border-radius: 20px; padding: 15px; text-align: center; border: 1px solid #eee; }
        .card img { width: 50px; margin-bottom: 10px; }
        .price { color: #007AFF; font-weight: bold; }
    </style>
</head>
<body>

    <h2 style="font-weight: 300;">OminiPay Test</h2>
    <div class="grid" id="container">Chargement...</div>

    <script>
        // 1. TA CONFIG PUBLIQUE (Copie-la depuis les paramètres de ton projet Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "ominipay.firebaseapp.com",
            projectId: "ominipay",
            appId: "1:..."
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. RECUPERATION DES CARTES
        function chargerCartes() {
            const container = document.getElementById('container');
            
            db.collection("cartes").get().then((querySnapshot) => {
                container.innerHTML = "";
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <img src="${data.image || 'https://via.placeholder.com/50'}" alt="logo">
                            <div style="font-size:14px; font-weight:600;">${data.nom}</div>
                            <div class="price">${data.prix} XOF</div>
                        </div>
                    `;
                });
            }).catch(err => {
                container.innerHTML = "Erreur de connexion : " + err.message;
            });
        }

        chargerCartes();
    </script>
</body>
</html>
