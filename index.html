<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OminiPay Pro - Pure Interface</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-page: #ffffff; 
            --accent: #007AFF;
            --text-main: #1d1d1f;
            --border-light: rgba(0, 0, 0, 0.08);
        }

        /* RESET ET SUPPRESSION DES INDICATEURS DE CLIC */
        * { 
            box-sizing: border-box; 
            margin: 0; padding: 0; 
            font-family: -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent; /* Supprime le flash bleu/gris sur mobile */
            outline: none;
        }

        body {
            background-color: var(--bg-page);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ANIMATION RÉACTIVE AU CLIC (MICRO-PRESSION) */
        .reactive-click:active {
            transform: scale(0.96);
            transition: transform 0.1s ease;
        }

        /* --- HEADER --- */
        .header {
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-light);
            position: fixed; top: 0; width: 100%; z-index: 1000;
        }

        .logo-img { height: 42px; width: auto; } /* Logo plus grand et visible */

        .btn-header {
            background: none; border: none; cursor: pointer;
            padding: 8px; color: var(--text-main);
            display: flex; align-items: center;
        }

        /* --- RECHERCHE --- */
        .search-container {
            margin-top: 90px;
            padding: 0 5%;
            width: 100%;
            max-width: 1200px;
            align-self: center;
        }

        .search-bar {
            display: flex; align-items: center;
            background: #fff;
            border: 1.5px solid var(--border-light);
            border-radius: 12px; padding: 12px 18px;
        }
        .search-bar input { border: none; background: none; width: 100%; margin-left: 12px; font-size: 16px; }

        /* --- ZONE DE CARTES (DYNAMIQUE) --- */
        .main-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px 5% 100px 5%;
        }

        .cards-grid {
            display: grid;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            /* 4 colonnes strictes sur grand écran */
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        /* Cartes en transparence totale */
        .card-slot {
            aspect-ratio: 1.6 / 1;
            background: transparent;
            border: 1px solid var(--border-light);
            border-radius: 16px;
            transition: border-color 0.3s ease;
        }
        .card-slot:hover { border-color: var(--accent); }

        @media (max-width: 900px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }

        /* --- FOOTER AVEC ÉTAT ACTIF BLEU --- */
        .footer {
            height: 75px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(25px);
            border-top: 1px solid var(--border-light);
            display: flex; justify-content: space-around; align-items: center;
            position: fixed; bottom: 0; width: 100%; z-index: 1000;
            padding-bottom: 10px;
        }

        .nav-link {
            display: flex; flex-direction: column; align-items: center;
            text-decoration: none; color: #8e8e93; /* Couleur grise par défaut */
            font-size: 11px; font-weight: 500; gap: 5px;
            transition: color 0.2s ease;
        }

        /* LE BLEU APPARAÎT SEULEMENT SUR L'ÉLÉMENT ACTIF */
        .nav-link.active {
            color: var(--accent);
        }

        /* --- MENU BLUR --- */
        #menu-blur {
            position: fixed; inset: 0; 
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(25px); 
            display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="menu-blur" onclick="toggleMenu()"></div>

    <header class="header">
        <button class="btn-header reactive-click" onclick="toggleMenu()"><i data-lucide="menu"></i></button>
        <img src="https://i.supaimg.com/ea4468b1-fe88-41fc-8e3b-2c3f403b206f/a1b7da54-63d4-402a-bc11-1ab5aaf9206e.png" alt="OminiPay" class="logo-img">
        <div style="display: flex; gap: 5px;">
            <button class="btn-header reactive-click"><i data-lucide="wallet"></i></button>
            <button class="btn-header reactive-click"><i data-lucide="bell"></i></button>
        </div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <i data-lucide="search" size="18" color="#8e8e93"></i>
            <input type="text" placeholder="Rechercher une carte...">
        </div>
    </div>

    <main class="main-scroll">
        <div class="cards-grid">
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
            <div class="card-slot reactive-click"></div>
        </div>
    </main>

    <footer class="footer">
        <a href="#" class="nav-link active reactive-click"><i data-lucide="home"></i><span>Accueil</span></a>
        <a href="#" class="nav-link reactive-click"><i data-lucide="badge-dollar-sign"></i><span>Vendre</span></a>
        <a href="#" class="nav-link reactive-click"><i data-lucide="shopping-cart"></i><span>Achat</span></a>
        <a href="#" class="nav-link reactive-click"><i data-lucide="list-ordered"></i><span>Commande</span></a>
    </footer>

    <script>
        lucide.createIcons();

        function toggleMenu() {
            const blur = document.getElementById('menu-blur');
            blur.style.display = (blur.style.display === 'block') ? 'none' : 'block';
        }

        // Script pour changer l'état actif au clic (pour démonstration)
        const links = document.querySelectorAll('.nav-link');
        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });
    </script>
</body>
</html>
